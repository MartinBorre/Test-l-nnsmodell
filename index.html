<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kompensasjonsmodell – Møller Bil</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#EDEBE5}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#D0CFC9;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#1400FF;cursor:pointer}
input[type=number]{outline:none}
input[type=number]:focus{border-color:#1400FF!important}
table{border-collapse:collapse}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo}=React;

const C={navy:"#1A1A3E",blue:"#1400FF",coral:"#E8503A",cream:"#EDEBE5",lg:"#F5F4F0",gray:"#6B6B7B",white:"#FFF",old:"#7B7B8E",green:"#16A34A",red:"#DC2626"};

const defaults={
  nyGrunnlonn:420000,nyAns:2476,
  nyTrinn:[1500,3000,3500,3000],nyG:[6,10,14],
  jevnhet:5000,
  nyM:{finansiering:2000,forsikring:400,dekkpakke:800,dekkhotell:500,innbytte:1500,tilbehor:500,serviceavtale:1000,ladelosning:700},
  dagFast:33641,dagAns:2476,
  dagTrinn:[1850,4650,5560],dagG:[6,12],
  dagT:{utstyr5k:541,utstyr12k:721,dekksalg:618,serviceavtale:618,leasing:515,forsikring:361,innbytte:1030,dekkhotell:103},
  dagP:{forhandler120:35000,selger120:35000,ktiForh:15000,ktiSelg:15000},
  biler:10,harNyAns:true,harDagAns:true,harJevn:true,
  pen:{finansiering:.35,forsikring:.25,dekkpakke:.30,dekkhotell:.15,innbytte:.40,tilbehor:.20,serviceavtale:.25,ladelosning:.20,utstyr5k:.20,utstyr12k:.10,dekksalg:.30,leasing:.15},
  dagPT:{forhandler120:true,selger120:true,ktiForh:true,ktiSelg:true},
};

function nyVol(b,t,g){
  return Math.min(b,g[0])*t[0]
    +Math.max(Math.min(b,g[1])-g[0],0)*t[1]
    +Math.max(Math.min(b,g[2])-g[1],0)*t[2]
    +Math.max(b-g[2],0)*t[3];
}
function dagProv(b,t,g){
  return Math.min(b,g[0])*t[0]
    +Math.max(Math.min(b,g[1])-g[0],0)*t[1]
    +Math.max(b-g[1],0)*t[2];
}

const fmt=n=>Math.round(n).toLocaleString("nb-NO");
const fmtD=n=>(n>=0?"+":"")+fmt(n);

function NI({value,onChange,small,prefix,suffix,step,min,max}){
  return <div style={{display:"flex",alignItems:"center",gap:4}}>
    {prefix&&<span style={{color:C.gray,fontSize:12}}>{prefix}</span>}
    <input type="number" value={value} onChange={e=>onChange(parseFloat(e.target.value)||0)} step={step||1} min={min} max={max}
      style={{width:small?65:90,padding:"4px 6px",border:"1px solid #D0CFC9",borderRadius:4,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.blue,background:"#FFFDE7",textAlign:"right"}}/>
    {suffix&&<span style={{color:C.gray,fontSize:11}}>{suffix}</span>}
  </div>
}

function Tog({value,onChange,label}){
  return <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
    <div onClick={()=>onChange(!value)} style={{width:36,height:20,borderRadius:10,position:"relative",background:value?C.blue:"#ccc",transition:"background .2s",cursor:"pointer"}}>
      <div style={{width:16,height:16,borderRadius:8,background:"white",position:"absolute",top:2,left:value?18:2,transition:"left .2s"}}/>
    </div>
    <span style={{color:C.navy}}>{label}</span>
  </label>
}

function Sec({title,color,children,collapsed,onToggle}){
  return <div style={{marginBottom:16}}>
    <div onClick={onToggle} style={{background:color||C.navy,color:"white",padding:"8px 14px",fontSize:12,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",borderRadius:collapsed?"6px":"6px 6px 0 0",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Outfit',sans-serif"}}>
      {title}<span style={{fontSize:14,transform:collapsed?"rotate(-90deg)":"rotate(0)",transition:"transform .2s"}}>▾</span>
    </div>
    {!collapsed&&<div style={{background:"white",border:"1px solid #E5E4DF",borderTop:"none",borderRadius:"0 0 6px 6px",padding:"10px 14px"}}>{children}</div>}
  </div>
}

function Row({label,children,alt}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:alt?"5px 14px":"5px 0",borderBottom:"1px solid #F0EFEA",background:alt?C.lg:"transparent",margin:alt?"0 -14px":0}}>
    <span style={{fontSize:13,color:C.navy}}>{label}</span>{children}
  </div>
}

function Bar({dagens,ny,label}){
  const mx=Math.max(dagens,ny,1);
  return <div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.gray,marginBottom:3}}>
      <span>{label}</span>
      <span style={{color:ny>dagens?C.green:ny<dagens?C.red:C.gray}}>{fmtD(ny-dagens)} kr</span>
    </div>
    <div style={{display:"flex",height:18}}><div style={{width:`${dagens/mx*100}%`,background:C.old,borderRadius:3,minWidth:dagens>0?2:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}><span style={{fontSize:9,color:"white",fontWeight:600}}>{fmt(dagens)}</span></div></div>
    <div style={{display:"flex",height:18,marginTop:2}}><div style={{width:`${ny/mx*100}%`,background:C.blue,borderRadius:3,minWidth:ny>0?2:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}><span style={{fontSize:9,color:"white",fontWeight:600}}>{fmt(ny)}</span></div></div>
  </div>
}

function App(){
  const[s,setS]=useState(defaults);
  const[col,setCol]=useState({pen:false,dagP:true,nyTr:true,dagTr:true});
  const[tab,setTab]=useState("compare");

  const u=useCallback((path,val)=>{
    setS(p=>{
      const n={...p};
      if(typeof path==="string"&&path.includes(".")){const[a,b]=path.split(".");n[a]={...p[a],[b]:val}}
      else if(Array.isArray(path)){const[a,i]=path;const arr=[...p[a]];arr[i]=val;n[a]=arr}
      else n[path]=val;
      return n;
    });
  },[]);

  const tgl=k=>setCol(p=>({...p,[k]:!p[k]}));

  const nyFastTotal=s.nyGrunnlonn+(s.harNyAns?s.nyAns*12:0);
  const dagFastTotal=(s.dagFast+(s.harDagAns?s.dagAns:0))*12;

  function calcNyMersalg(b){
    return b*s.pen.finansiering*s.nyM.finansiering+b*s.pen.forsikring*s.nyM.forsikring+b*s.pen.dekkpakke*s.nyM.dekkpakke+b*s.pen.dekkhotell*s.nyM.dekkhotell+b*s.pen.innbytte*s.nyM.innbytte+b*s.pen.tilbehor*s.nyM.tilbehor+b*s.pen.serviceavtale*s.nyM.serviceavtale+b*s.pen.ladelosning*s.nyM.ladelosning;
  }
  function calcDagTillegg(b){
    return b*s.pen.forsikring*s.dagT.forsikring+b*s.pen.dekksalg*s.dagT.dekksalg+b*s.pen.dekkhotell*s.dagT.dekkhotell+b*s.pen.serviceavtale*s.dagT.serviceavtale+b*s.pen.innbytte*s.dagT.innbytte+b*s.pen.utstyr5k*s.dagT.utstyr5k+b*s.pen.utstyr12k*s.dagT.utstyr12k+b*s.pen.leasing*s.dagT.leasing;
  }
  function calcDagPrest(){
    return (s.dagPT.forhandler120?s.dagP.forhandler120:0)+(s.dagPT.selger120?s.dagP.selger120:0)+(s.dagPT.ktiForh?s.dagP.ktiForh:0)+(s.dagPT.ktiSelg?s.dagP.ktiSelg:0);
  }

  const calc=useMemo(()=>{
    const b=s.biler;
    const nV=nyVol(b,s.nyTrinn,s.nyG)*12;
    const nJ=s.harJevn?s.jevnhet*12:0;
    const nM=calcNyMersalg(b)*12;
    const nT=nyFastTotal+nV+nJ+nM;

    const dP=dagProv(b,s.dagTrinn,s.dagG)*12;
    const dT=calcDagTillegg(b)*12;
    const dPr=calcDagPrest();
    const dTot=dagFastTotal+dP+dT+dPr;

    const scenarios=[4,6,7,8,10,12,14,17,20].map(sb=>{
      const nv2=nyVol(sb,s.nyTrinn,s.nyG)*12;
      const nm2=calcNyMersalg(sb)*12;
      const nt2=nyFastTotal+nv2+(s.harJevn?s.jevnhet*12:0)+nm2;
      const dp2=dagProv(sb,s.dagTrinn,s.dagG)*12;
      const dt2=calcDagTillegg(sb)*12;
      const dtot2=dagFastTotal+dp2+dt2+dPr;
      return{biler:sb,dagens:dtot2,ny:nt2,diff:nt2-dtot2};
    });
    return{nF:nyFastTotal,nV,nJ,nM,nT,dFA:dagFastTotal,dP,dT,dPr,dTot,diff:nT-dTot,scenarios};
  },[s,nyFastTotal,dagFastTotal]);

  const ts=t=>({padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer",border:"none",background:tab===t?C.navy:"transparent",color:tab===t?"white":C.navy,borderRadius:"6px 6px 0 0",fontFamily:"'Outfit',sans-serif",letterSpacing:.5});

  const trinnLabel=(i)=>{
    if(i===0) return `1 – ${s.nyG[0]} biler`;
    if(i<s.nyG.length) return `${s.nyG[i-1]+1} – ${s.nyG[i]} biler`;
    return `${s.nyG[s.nyG.length-1]+1}+ biler`;
  };
  const dagTrinnLabel=(i)=>{
    if(i===0) return `1 – ${s.dagG[0]} biler`;
    if(i<s.dagG.length) return `${s.dagG[i-1]+1} – ${s.dagG[i]} biler`;
    return `${s.dagG[s.dagG.length-1]+1}+ biler`;
  };

  return <div style={{minHeight:"100vh",background:C.cream}}>
    <div style={{background:C.navy,padding:"20px 24px 0",borderBottom:`3px solid ${C.blue}`}}>
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <h1 style={{color:"white",fontSize:22,fontWeight:800,margin:0,letterSpacing:-.5}}>Kompensasjonsmodell</h1>
            <p style={{color:C.blue,fontSize:13,margin:"4px 0 0",fontWeight:500}}>Ny vs. dagens modell — bilselgere nye biler</p>
          </div>
          <div style={{color:C.gray,fontSize:11,textAlign:"right",paddingTop:4}}>Møller Bil</div>
        </div>
        <div style={{display:"flex",gap:2}}>
          <button style={ts("compare")} onClick={()=>setTab("compare")}>Sammenligning</button>
          <button style={ts("rates")} onClick={()=>setTab("rates")}>Satser</button>
          <button style={ts("scenarios")} onClick={()=>setTab("scenarios")}>Scenarioer</button>
        </div>
      </div>
    </div>

    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 24px"}}>

    {tab==="compare"&&<>
      {/* Slider */}
      <div style={{background:"white",borderRadius:8,padding:16,marginBottom:20,border:"1px solid #E5E4DF"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
              <span style={{fontSize:13,color:C.navy,fontWeight:600}}>Biler per måned</span>
              <span style={{fontSize:28,fontWeight:800,color:C.blue,fontFamily:"'DM Mono',monospace"}}>{s.biler}</span>
            </div>
            <input type="range" min={1} max={25} value={s.biler} onChange={e=>u("biler",parseInt(e.target.value))} style={{width:"100%",accentColor:C.blue}}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.gray}}><span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span></div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <Tog value={s.harDagAns} onChange={v=>u("harDagAns",v)} label="Ansiennitet dagens"/>
            <Tog value={s.harNyAns} onChange={v=>u("harNyAns",v)} label="Ansiennitet ny"/>
            <Tog value={s.harJevn} onChange={v=>u("harJevn",v)} label="Jevnhetsbonus (ny)"/>
          </div>
        </div>
      </div>

      {/* Big numbers */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        <div style={{background:C.old,borderRadius:8,padding:16,color:"white"}}>
          <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1.5,opacity:.8,marginBottom:4}}>Dagens modell</div>
          <div style={{fontSize:28,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>kr {fmt(calc.dTot)}</div>
          <div style={{fontSize:11,opacity:.7,marginTop:2}}>Variabel: {calc.dTot>0?((calc.dTot-calc.dFA)/calc.dTot*100).toFixed(0):0}%</div>
        </div>
        <div style={{background:C.blue,borderRadius:8,padding:16,color:"white"}}>
          <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1.5,opacity:.8,marginBottom:4}}>Ny modell</div>
          <div style={{fontSize:28,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>kr {fmt(calc.nT)}</div>
          <div style={{fontSize:11,opacity:.7,marginTop:2}}>Variabel: {calc.nT>0?((calc.nT-calc.nF)/calc.nT*100).toFixed(0):0}%</div>
        </div>
      </div>

      {/* Diff badge */}
      <div style={{background:calc.diff>=0?"#E8F5E9":"#FFEBEE",borderRadius:8,padding:"10px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${calc.diff>=0?"#A5D6A7":"#EF9A9A"}`}}>
        <span style={{fontSize:13,color:C.navy,fontWeight:600}}>Differanse (ny − dagens)</span>
        <span style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",color:calc.diff>=0?C.green:C.red}}>{fmtD(calc.diff)} kr</span>
      </div>

      {/* Breakdown */}
      <div style={{background:"white",borderRadius:8,padding:16,border:"1px solid #E5E4DF",marginBottom:20}}>
        <div style={{display:"flex",gap:12,marginBottom:12,fontSize:11}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,borderRadius:2,background:C.old}}/> Dagens</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,borderRadius:2,background:C.blue}}/> Ny</div>
        </div>
        <Bar label="Fastlønn" dagens={calc.dFA} ny={calc.nF}/>
        <Bar label="Provisjon / Volumbonus" dagens={calc.dP} ny={calc.nV}/>
        <Bar label="Jevnhetsbonus" dagens={0} ny={calc.nJ}/>
        <Bar label="Tillegg / Mersalg" dagens={calc.dT} ny={calc.nM}/>
        <Bar label="Prestasjonsbonus" dagens={calc.dPr} ny={0}/>
      </div>

      {/* Penetrasjon */}
      <Sec title="Penetrasjonsrater" color={C.navy} collapsed={col.pen} onToggle={()=>tgl("pen")}>
        <p style={{fontSize:11,color:C.gray,margin:"0 0 8px"}}>Juster andelen av kunder som benytter hvert produkt.</p>
        {[["forsikring","Forsikring"],["dekkpakke","Dekk/Dekkpakke"],["dekkhotell","Dekkhotell"],["serviceavtale","Serviceavtale"],["innbytte","Innbytte bruktbil"],["tilbehor","Utstyr/tilbehør >5k"],["utstyr5k","Utstyr >5k (dagens)"],["utstyr12k","Utstyr >12k (dagens)"],["leasing","Leasing (dagens)"],["dekksalg","Dekksalg (dagens)"],["finansiering","Finansiering (ny)"],["ladelosning","Ladeløsning (ny)"]].map(([k,l],i)=>
          <Row key={k} label={l} alt={i%2===1}><NI value={Math.round(s.pen[k]*100)} onChange={v=>u(`pen.${k}`,v/100)} small suffix="%" step={5}/></Row>
        )}
      </Sec>

      {/* Prestasjonsbonus */}
      <Sec title="Prestasjonsbonus – dagens modell" color={C.old} collapsed={col.dagP} onToggle={()=>tgl("dagP")}>
        {[["forhandler120","Forhandler >120 biler/selger"],["selger120","Selger >120 biler"],["ktiForh","KTI forhandler OK"],["ktiSelg","KTI selger OK"]].map(([k,l])=>
          <Row key={k} label={l}><Tog value={s.dagPT[k]} onChange={v=>u(`dagPT.${k}`,v)} label=""/></Row>
        )}
      </Sec>
    </>}

    {tab==="rates"&&<>
      <Sec title="Ny modell – Fastlønn" color={C.blue} collapsed={false} onToggle={()=>{}}>
        <Row label="Grunnlønn per år"><NI value={s.nyGrunnlonn} onChange={v=>u("nyGrunnlonn",v)} prefix="kr"/></Row>
        <Row label="Ansiennitetstillegg per mnd" alt><NI value={s.nyAns} onChange={v=>u("nyAns",v)} prefix="kr"/></Row>
        <Row label="Jevnhetsbonus per måned"><NI value={s.jevnhet} onChange={v=>u("jevnhet",v)} prefix="kr"/></Row>
        <div style={{padding:"6px 0",fontSize:12,color:C.gray,borderTop:"1px solid #E5E4DF",marginTop:4}}>
          Total fastlønn (m/ansiennitet): <strong style={{color:C.navy}}>kr {fmt(s.nyGrunnlonn+s.nyAns*12)}</strong>
        </div>
      </Sec>

      <Sec title="Ny modell – Volumbonus" color={C.blue} collapsed={col.nyTr} onToggle={()=>tgl("nyTr")}>
        <p style={{fontSize:11,color:C.gray,margin:"0 0 8px"}}>Juster både terskler (øvre grense per trinn) og bonussats per bil.</p>
        {s.nyTrinn.map((v,i)=>
          <Row key={i} label={`Trinn ${i+1}`} alt={i%2===1}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {i<3?<>
                <span style={{fontSize:11,color:C.gray}}>t.o.m.</span>
                <NI value={s.nyG[i]} onChange={v2=>u(["nyG",i],v2)} small suffix="biler" step={1} min={i>0?s.nyG[i-1]+1:1}/>
              </>:<span style={{fontSize:11,color:C.gray,width:95,textAlign:"right"}}>{s.nyG[2]+1}+ biler</span>}
              <NI value={v} onChange={v2=>u(["nyTrinn",i],v2)} prefix="kr"/>
            </div>
          </Row>
        )}
        <div style={{padding:"6px 0",fontSize:12,color:C.gray,borderTop:"1px solid #E5E4DF",marginTop:4}}>
          Trinn: 1–{s.nyG[0]} / {s.nyG[0]+1}–{s.nyG[1]} / {s.nyG[1]+1}–{s.nyG[2]} / {s.nyG[2]+1}+
        </div>
      </Sec>

      <Sec title="Ny modell – Mersalgssatser" color={C.blue} collapsed={false} onToggle={()=>{}}>
        {[["finansiering","Finansiering"],["forsikring","Forsikring"],["dekkpakke","Dekkpakke"],["dekkhotell","Dekkhotell"],["innbytte","Innbytte bruktbil"],["tilbehor","Tilbehør/styling"],["serviceavtale","Serviceavtale"],["ladelosning","Ladeløsning"]].map(([k,l],i)=>
          <Row key={k} label={l} alt={i%2===1}><NI value={s.nyM[k]} onChange={v=>u(`nyM.${k}`,v)} prefix="kr"/></Row>
        )}
      </Sec>

      <Sec title="Dagens modell – Fastlønn" color={C.old} collapsed={false} onToggle={()=>{}}>
        <Row label="Fastlønn per mnd"><NI value={s.dagFast} onChange={v=>u("dagFast",v)} prefix="kr"/></Row>
        <Row label="Ansiennitetstillegg per mnd" alt><NI value={s.dagAns} onChange={v=>u("dagAns",v)} prefix="kr"/></Row>
      </Sec>

      <Sec title="Dagens modell – Provisjon per bil" color={C.old} collapsed={col.dagTr} onToggle={()=>tgl("dagTr")}>
        {s.dagTrinn.map((v,i)=>
          <Row key={i} label={`Trinn ${i+1}`} alt={i%2===1}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {i<2?<>
                <span style={{fontSize:11,color:C.gray}}>t.o.m.</span>
                <NI value={s.dagG[i]} onChange={v2=>u(["dagG",i],v2)} small suffix="biler" step={1} min={i>0?s.dagG[i-1]+1:1}/>
              </>:<span style={{fontSize:11,color:C.gray,width:95,textAlign:"right"}}>{s.dagG[1]+1}+ biler</span>}
              <NI value={v} onChange={v2=>u(["dagTrinn",i],v2)} prefix="kr"/>
            </div>
          </Row>
        )}
      </Sec>

      <Sec title="Dagens modell – Tilleggssatser" color={C.old} collapsed={false} onToggle={()=>{}}>
        {[["utstyr5k","Utstyr >5 000"],["utstyr12k","Utstyr >12 000"],["dekksalg","Dekksalg"],["serviceavtale","Serviceavtale"],["leasing","Leasing"],["forsikring","Forsikring"],["innbytte","Innbyttebil"],["dekkhotell","Dekkhotell"]].map(([k,l],i)=>
          <Row key={k} label={l} alt={i%2===1}><NI value={s.dagT[k]} onChange={v=>u(`dagT.${k}`,v)} prefix="kr"/></Row>
        )}
      </Sec>

      <Sec title="Dagens modell – Prestasjonsbonus (årlig)" color={C.old} collapsed={false} onToggle={()=>{}}>
        {[["forhandler120","Forhandler >120 biler/selger"],["selger120","Selger >120 biler"],["ktiForh","KTI forhandler OK"],["ktiSelg","KTI selger OK"]].map(([k,l],i)=>
          <Row key={k} label={l} alt={i%2===1}><NI value={s.dagP[k]} onChange={v=>u(`dagP.${k}`,v)} prefix="kr"/></Row>
        )}
      </Sec>
    </>}

    {tab==="scenarios"&&
      <div style={{background:"white",borderRadius:8,border:"1px solid #E5E4DF",overflow:"hidden"}}>
        <table style={{width:"100%",fontSize:13}}>
          <thead><tr style={{background:C.navy,color:"white"}}>
            {["Biler/mnd","Biler/år","Dagens","Ny modell","Differanse"].map(h=>
              <th key={h} style={{padding:"10px 12px",textAlign:h.includes("Biler")?"center":"right",fontWeight:600,fontSize:11,letterSpacing:.5}}>{h}</th>
            )}
          </tr></thead>
          <tbody>{calc.scenarios.map((sc,i)=>
            <tr key={sc.biler} style={{background:sc.biler===s.biler?"#E8EEFF":i%2===1?C.lg:"white",fontWeight:sc.biler===s.biler?700:400}}>
              <td style={{padding:"8px 12px",textAlign:"center",color:C.navy}}>{sc.biler}</td>
              <td style={{padding:"8px 12px",textAlign:"center",color:C.gray}}>{sc.biler*12}</td>
              <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.old}}>kr {fmt(sc.dagens)}</td>
              <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.blue}}>kr {fmt(sc.ny)}</td>
              <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"'DM Mono',monospace",color:sc.diff>=0?C.green:C.red,fontWeight:600}}>{fmtD(sc.diff)}</td>
            </tr>
          )}</tbody>
        </table>
        <div style={{padding:"8px 12px",fontSize:11,color:C.gray,borderTop:"1px solid #E5E4DF"}}>
          Positiv differanse = ny modell betaler mer. Raden som matcher valgt biler/mnd er uthevet.
        </div>
      </div>
    }

    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
